<div class="lobby">
  <h1>Lobby</h1>
  <div class="player-list">
    <h2>Players</h2>
    <ul>
      <li *ngFor="let player of players">{{ player.name }}</li>
    </ul>
  </div>
  <div class="actions">
    <button (click)="startGame()">Start Game</button>
    <button (click)="leaveLobby()">Leave Lobby</button>
  </div>
</div>
